<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blogs — CIWeb</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f5f3ee;--ink:#1a1814;--muted:#7a7570;--accent:#e8401c;--card:#fff;--border:#e2ddd6;--tag-bg:#fff0ec}
    body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink)}
    nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:0 6%;display:flex;align-items:center;justify-content:space-between;height:64px}
    .logo{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--ink);text-decoration:none;letter-spacing:-0.5px}
    .logo-accent{color:var(--accent);font-style:normal;font-weight:900}
    .nav-links{display:flex;gap:1.4rem;list-style:none;align-items:center}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:0.88rem;font-weight:500;transition:color 0.2s}
    .nav-links a:hover,.nav-links a.active{color:var(--ink)}
    .nav-cta{background:var(--ink)!important;color:var(--bg)!important;padding:8px 18px;border-radius:100px;font-weight:600!important}
    .nav-cta:hover{background:var(--accent)!important;color:#fff!important}
    .page-hero{max-width:1300px;margin:0 auto;padding:70px 6% 50px;border-bottom:1px solid var(--border)}
    .page-label{font-size:0.75rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
    .page-label::before{content:'';display:block;width:24px;height:2px;background:var(--accent)}
    .page-hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,5vw,4rem);font-weight:900;letter-spacing:-2px;line-height:1.1;margin-bottom:1rem}
    .page-hero p{color:var(--muted);font-size:1.05rem;line-height:1.75;max-width:500px;font-weight:300}
    .search-wrap{max-width:1300px;margin:0 auto;padding:30px 6% 0;display:flex;gap:1rem;align-items:center}
    .search-box{flex:1;display:flex;align-items:center;gap:0.6rem;background:var(--card);border:1.5px solid var(--border);border-radius:100px;padding:10px 20px;transition:border-color 0.2s}
    .search-box:focus-within{border-color:var(--accent)}
    .search-box input{border:none;outline:none;background:transparent;font-family:'Outfit',sans-serif;font-size:0.92rem;color:var(--ink);width:100%}
    .search-box input::placeholder{color:var(--muted)}
    .clear-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:0;display:none}
    .clear-btn.v{display:block}
    .tag-filters{max-width:1300px;margin:0 auto;padding:16px 6% 0;display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center}
    .filter-label{font-size:0.78rem;color:var(--muted);font-weight:500;margin-right:0.3rem}
    .tag-btn{background:var(--card);border:1.5px solid var(--border);color:var(--muted);font-size:0.75rem;font-weight:600;padding:5px 14px;border-radius:100px;cursor:pointer;font-family:'Outfit',sans-serif;text-transform:uppercase;transition:all 0.2s}
    .tag-btn:hover{border-color:var(--accent);color:var(--accent)}
    .tag-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .results-info{max-width:1300px;margin:0 auto;padding:18px 6% 0;font-size:0.85rem;color:var(--muted);min-height:28px}
    .results-info strong{color:var(--ink)}
    .blogs-section{max-width:1300px;margin:0 auto;padding:20px 6% 80px}
    .blog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.5rem}
    .blog-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.6rem;text-decoration:none;color:var(--ink);transition:all 0.25s ease;display:flex;flex-direction:column;animation:fadeUp 0.4s ease both}
    .blog-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.08);border-color:#ccc}
    .card-tag{background:var(--tag-bg);color:var(--accent);font-size:0.7rem;font-weight:600;padding:4px 10px;border-radius:100px;text-transform:uppercase;margin-bottom:0.9rem;width:fit-content}
    .blog-card h3{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;line-height:1.4;margin-bottom:0.6rem;flex:1}
    .blog-card p{color:var(--muted);font-size:0.85rem;line-height:1.6;margin-bottom:1.2rem}
    .card-footer{display:flex;align-items:center;justify-content:space-between;font-size:0.78rem;color:var(--muted);border-top:1px solid var(--border);padding-top:0.9rem;margin-top:auto}
    .read-arrow{color:var(--accent);font-weight:600}
    mark{background:rgba(232,64,28,0.15);color:var(--accent);border-radius:3px;padding:0 2px}
    .empty-state{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--muted)}
    .empty-state h3{font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:0.6rem;color:var(--ink)}
    footer{border-top:1px solid var(--border);padding:2rem 6%;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;max-width:1300px;margin:0 auto}
    footer p{font-size:0.82rem;color:var(--muted)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @media(max-width:768px){.nav-links{display:none}}
    #cw-toggle{position:fixed;bottom:28px;right:28px;z-index:10000;display:flex;align-items:center;background:rgba(20,18,15,0.92);backdrop-filter:blur(16px);border-radius:100px;padding:5px;box-shadow:0 8px 32px rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.1)}
    .cw-opt{padding:9px 20px;border-radius:100px;font-size:0.75rem;font-weight:700;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.38);font-family:'Outfit',sans-serif;letter-spacing:0.8px;transition:all 0.28s}
    .cw-opt.on{background:linear-gradient(135deg,#e8401c,#c73516);color:#fff;box-shadow:0 3px 14px rgba(232,64,28,0.45)}
    .cw-sep{width:1px;height:14px;background:rgba(255,255,255,0.1)}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">CI<span class="logo-accent">Web</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="blogs.html" class="active">Blogs</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="terms.html">Terms</a></li>
  </ul>
</nav>

<div class="page-hero">
  <div class="page-label" data-en="All Blogs" data-hi="Saare Blogs">Saare Blogs</div>
  <h1 data-en="All Blogs" data-hi="Saare Blogs">Saare Blogs</h1>
  <p data-en="Latest articles on AI, coding and digital world." data-hi="AI, coding, aur digital world ke baare mein sabse latest articles.">AI, coding, aur digital world ke baare mein sabse latest articles.</p>
</div>

<div class="search-wrap">
  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="search-input" placeholder="Blog search karo..." oninput="onSearch()"/>
    <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="tag-filters" id="tag-filters">
  <span class="filter-label">Filter:</span>
  <button class="tag-btn active" id="tag-all" onclick="filterTag('all',this)" data-en="All" data-hi="Sab">Sab</button>
</div>

<div class="results-info" id="results-info"></div>
<div class="blogs-section">
  <div class="blog-grid" id="blog-grid">
    <div class="empty-state"><h3>⏳ Load ho raha hai...</h3></div>
  </div>
</div>

<footer>
  <a href="index.html" class="logo">CI<span class="logo-accent">Web</span></a>
  <p data-en="© 2026 CIWeb. All rights reserved." data-hi="© 2026 CIWeb. Sare adhikar surakshit.">© 2026 CIWeb. Sare adhikar surakshit.</p>
  <p data-en="Made with ❤️ for Tech Lovers" data-hi="Tech Lovers ke liye ❤️ se banaya">Tech Lovers ke liye ❤️ se banaya</p>
</footer>

<div id="cw-toggle">
  <button class="cw-opt" id="cw-hi" onclick="setLang('hi')">🇮🇳 Hinglish</button>
  <div class="cw-sep"></div>
  <button class="cw-opt" id="cw-en" onclick="setLang('en')">🇬🇧 English</button>
</div>

<!-- Load blog data FIRST -->
<script src="blogs.js"></script>

<!-- Then run blog logic -->
<script>
  var aB = [];
  var aT = 'all';

  function getLang() {
    return localStorage.getItem('ciweb_lang') || 'hi';
  }

  function getTitle(b) {
    return getLang() === 'en' ? b.title_en : b.title_hi;
  }

  function getDesc(b) {
    return getLang() === 'en' ? b.desc_en : b.desc_hi;
  }

  function safeHL(text, query) {
    if (!query || !text) return text || '';
    try {
      var escaped = query.replace(/[\-\[\]\/\{\}\(\)\*\+\?\.\\\^\$\|]/g, '\\$&');
      return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
    } catch (e) {
      return text;
    }
  }

  function buildTags() {
    // Remove old dynamic tags
    var old = document.querySelectorAll('.tag-btn[data-dyn]');
    for (var i = 0; i < old.length; i++) old[i].remove();

    // Get unique tags
    var seen = {};
    var tags = [];
    for (var j = 0; j < aB.length; j++) {
      var t = aB[j].tag || 'Tech';
      if (!seen[t]) { seen[t] = true; tags.push(t); }
    }

    var container = document.getElementById('tag-filters');
    tags.forEach(function(tag) {
      var btn = document.createElement('button');
      btn.className = 'tag-btn';
      btn.textContent = tag;
      btn.setAttribute('data-dyn', '1');
      btn.onclick = function() { filterTag(tag, btn); };
      container.appendChild(btn);
    });
  }

  function filterTag(tag, btn) {
    aT = tag;
    var btns = document.querySelectorAll('.tag-btn');
    for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
    btn.classList.add('active');
    applyFilters();
  }

  function onSearch() {
    var v = document.getElementById('search-input').value;
    var cb = document.getElementById('clear-btn');
    if (v.length > 0) cb.classList.add('v'); else cb.classList.remove('v');
    applyFilters();
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('clear-btn').classList.remove('v');
    applyFilters();
  }

  function applyFilters() {
    var q = document.getElementById('search-input').value.trim().toLowerCase();
    var filtered = aB.slice();

    if (aT !== 'all') {
      filtered = filtered.filter(function(b) { return (b.tag || 'Tech') === aT; });
    }
    if (q) {
      filtered = filtered.filter(function(b) {
        return getTitle(b).toLowerCase().indexOf(q) > -1 ||
               getDesc(b).toLowerCase().indexOf(q) > -1 ||
               (b.tag || '').toLowerCase().indexOf(q) > -1;
      });
    }
    renderBlogs(filtered, q);
  }

  function renderBlogs(blogs, query) {
    var grid = document.getElementById('blog-grid');
    var info = document.getElementById('results-info');
    var lang = getLang();
    var q = query || '';

    if (!blogs || blogs.length === 0) {
      info.innerHTML = '';
      grid.innerHTML = '<div class="empty-state"><h3>😕 Koi result nahi</h3><p>Doosra keyword try karo.</p></div>';
      return;
    }

    info.innerHTML = q
      ? '<strong>' + blogs.length + '</strong> result mila'
      : '<strong>' + blogs.length + '</strong> blogs';

    var html = '';
    for (var i = 0; i < blogs.length; i++) {
      var b = blogs[i];
      var title = safeHL(getTitle(b), q);
      var desc  = safeHL(getDesc(b), q);
      var arrow = lang === 'en' ? 'Read &rarr;' : 'Padho &rarr;';
      html += '<a class="blog-card" href="' + b.link + '" style="animation-delay:' + (i * 0.05) + 's">'
            + '<span class="card-tag">' + (b.tag || 'Tech') + '</span>'
            + '<h3>' + title + '</h3>'
            + '<p>' + desc + '</p>'
            + '<div class="card-footer"><span>&#128197; ' + b.date + '</span>'
            + '<span class="read-arrow">' + arrow + '</span></div>'
            + '</a>';
    }
    grid.innerHTML = html;
  }

  function setLang(l) {
    localStorage.setItem('ciweb_lang', l);
    var els = document.querySelectorAll('[data-en][data-hi]');
    for (var i = 0; i < els.length; i++) {
      els[i].textContent = l === 'en' ? els[i].dataset.en : els[i].dataset.hi;
    }
    document.getElementById('cw-hi').classList.toggle('on', l === 'hi');
    document.getElementById('cw-en').classList.toggle('on', l === 'en');
    applyFilters();
  }

  // ── INIT ──
  function init() {
    // Load data from blogs.js (BLOGS_DATA global)
    aB = (typeof BLOGS_DATA !== 'undefined') ? BLOGS_DATA : [];

    // Apply saved language
    var savedLang = localStorage.getItem('ciweb_lang') || 'hi';
    setLang(savedLang);

    buildTags();
    renderBlogs(aB, '');
  }

  // Run after page loads
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
</script>

</body>
</html>
