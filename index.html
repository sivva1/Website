<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CIWeb — Tech Knowledge in Hindi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f3ee;
      --ink: #1a1814;
      --muted: #7a7570;
      --accent: #e8401c;
      --card: #ffffff;
      --border: #e2ddd6;
      --tag-bg: #fff0ec;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 0 6%; display: flex; align-items: center; justify-content: space-between; height: 64px;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; color: var(--ink); text-decoration: none; letter-spacing: -0.5px; }
    .logo em { color: var(--accent); font-style: normal; }
    .nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--ink); }
    .nav-cta { background: var(--ink) !important; color: var(--bg) !important; padding: 8px 20px; border-radius: 100px; font-weight: 600 !important; }
    .nav-cta:hover { background: var(--accent) !important; color: #fff !important; }

    /* HERO */
    .hero {
      padding: 80px 6% 60px; border-bottom: 1px solid var(--border);
      display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
      max-width: 1300px; margin: 0 auto; animation: fadeUp 0.7s ease both;
    }
    .hero-tag { display: inline-flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; }
    .hero-tag::before { content: ''; display: block; width: 28px; height: 2px; background: var(--accent); }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 5vw, 4.5rem); font-weight: 900; line-height: 1.08; letter-spacing: -2px; margin-bottom: 1.5rem; }
    .hero h1 .line2 { color: var(--accent); display: block; }
    .hero p { font-size: 1.05rem; color: var(--muted); line-height: 1.75; max-width: 440px; margin-bottom: 2rem; font-weight: 300; }
    .hero-btns { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .btn-primary { background: var(--accent); color: #fff; padding: 12px 28px; border-radius: 100px; font-weight: 600; font-size: 0.9rem; text-decoration: none; transition: all 0.2s; }
    .btn-primary:hover { background: #c73516; transform: translateY(-1px); }
    .btn-outline { border: 1.5px solid var(--border); color: var(--ink); padding: 12px 28px; border-radius: 100px; font-weight: 500; font-size: 0.9rem; text-decoration: none; transition: all 0.2s; }
